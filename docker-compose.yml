services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: horizon
      POSTGRES_USER: horizon
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      TZ: America/Toronto
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U horizon"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://horizon:${DB_PASSWORD}@db:5432/horizon
      SESSION_SECRET: ${SESSION_SECRET}
      ALLOW_HTTP: "true"
      TZ: America/Toronto
      NODE_ENV: production
    ports:
      - "3001:3000"

  jobs:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://horizon:${DB_PASSWORD}@db:5432/horizon
      BACKUP_DIR: /backups
      TZ: America/Toronto
      NODE_ENV: production
    volumes:
      - ./backups:/backups
    command: ["node", "--import", "tsx", "jobs/index.ts"]

volumes:
  pgdata:
